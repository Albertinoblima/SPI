name: Update TSE Voter Data

on:
  schedule:
    # Executar no primeiro dia do mês às 00:00 UTC (20:00 Brasília)
    - cron: '0 0 1 * *'
  workflow_dispatch:
    # Permitir disparo manual via GitHub UI

permissions:
  contents: write

jobs:
  update-tse-data:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Generate TSE voter data
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          .\scripts\generate-tse-voters.ps1

      - name: Check for changes
        id: changes
        shell: pwsh
        run: |
          $status = git status --porcelain
          if ($status) {
            Write-Host "Mudanças detectadas:"
            Write-Host $status
            "has_changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            Write-Host "Nenhuma mudança detectada"
            "has_changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Configure Git
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898752+github-actions[bot]@users.noreply.github.com"

      - name: Commit TSE data updates
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          $today = Get-Date -Format 'dd/MM/yyyy'
          git add apps/web/src/lib/geo/tse-voter-data.json
          git commit -m "data(tse): atualizar dados eleitorais do TSE" -m "- Todos os municípios brasileiros`n- Proporções por sexo (M/F)`n- Distribuição por faixa etária (16-80+ anos)`n- Data: $today" -m "Co-authored-by: github-actions[bot] <41898752+github-actions[bot]@users.noreply.github.com>"

      - name: Push updates
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue if data changed
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '📊 Dados eleitorais do TSE atualizados',
              body: `Os dados do eleitorado do TSE foram atualizados com sucesso!\n\n**Data**: ${new Date().toLocaleDateString('pt-BR')}\n\n**Alterações**:\n- ✅ Perfil do eleitorado por município\n- ✅ Distribuição por sexo\n- ✅ Distribuição por faixa etária\n\nOs dados estão disponíveis em \`apps/web/src/lib/geo/tse-voter-data.json\``,
              labels: ['data', 'tse', 'automated']
            });

      - name: Log summary
        shell: pwsh
        run: |
          Write-Host "✅ Workflow concluído" -ForegroundColor Green
          Write-Host "Tem mudanças? ${{ steps.changes.outputs.has_changes }}" -ForegroundColor Cyan
