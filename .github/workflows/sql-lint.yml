name: SQL Linting with SQLFluff

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'supabase/**/*.sql'
      - '.sqlfluff*'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'supabase/**/*.sql'
      - '.sqlfluff*'

jobs:
  sqlfluff-lint:
    name: SQL Lint with SQLFluff
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install sqlfluff
        run: |
          python -m pip install --upgrade pip
          pip install sqlfluff[postgres]

      - name: Run SQLFluff lint on all SQL files
        run: |
          sqlfluff lint supabase/ \
            --dialect postgres \
            --format github

      - name: Check SQL formatting
        continue-on-error: true
        run: |
          sqlfluff fix supabase/ \
            --dialect postgres \
            --check

  sql-security:
    name: SQL Security Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install sqlparse pyyaml

      - name: Check for dangerous patterns
        continue-on-error: true
        run: |
          python scripts/check-sql-security.py supabase/migrations/ || true

      - name: Validate migration file naming
        continue-on-error: true
        run: |
          python scripts/validate-migration-names.py supabase/migrations/ || true
