# SQLFluff Configuration for PostgreSQL
# Versionado em: 17 de maio de 2026
# Dialeto: PostgreSQL
# Compatibilidade: SQLFluff >= 2.0.0

# ============================================================================
# CORE CONFIGURATION
# ============================================================================
core:
  dialect: postgres
  encoding: utf-8
  max_line_length: 88
  ignore_errors: false
  
  # Padrões de ignorar (glob patterns)
  ignore_paths:
    - node_modules/
    - .turbo/
    - .venv/
    - dist/
    - build/
    - .git/

# ============================================================================
# FORMATTER CONFIGURATION
# ============================================================================
sqlfluff:
  templater: raw
  formatter: default
  color: true

# ============================================================================
# LINTING RULES
# ============================================================================
rules:
  # L001: Espaçamento excessivo
  capitalisation:
    keywords: consistent
    functions: consistent
    types: consistent
    identifiers: consistent
  
  # L002: Espaçamento esperado
  spacing:
    spacing_before: touch
    spacing_after: touch
  
  # L003: Espaçamento conflitante
  comma_spacing:
    spacing_before: forbid
    spacing_after: require
  
  # L004: Espaçamento desnecessário
  indentation:
    indent_unit: space
    indent_size: 2
    tab_space_size: 2
    indent_before: switch
  
  # L005: Capitalização
  capitalisation_keywords:
    capitalisation_policy: consistent
  
  # L006: Operadores
  operator_spacing:
    and_or_newlines: align
  
  # L009: Espaços depois de SELECT
  select_trailing_comma:
    select_clause_trailing_comma: forbid
  
  # L010: Aliases
  aliasing:
    aliasing: explicit
    allow_scalar: true
  
  # L011: Alias em SELECT
  aliasing_tables:
    aliasing: explicit
  
  # L012: Alias em colunas
  aliasing_columns:
    aliasing: explicit
  
  # L030: Espaçamento de operadores
  operator_new_lines:
    operator_new_lines: before
  
  # L031: Não usar espaços de mais
  layout:
    type: start_only
  
  # L035: Semicolon terminator
  statement_ends:
    statement_terminator: semicolon
  
  # L039: Espaços desnecessários antes de parênteses
  bracket_spacing:
    # Mantém espaçamento consistente
    spacing_before: forbid
    spacing_after: forbid
  
  # L040: Esvaziar linhas
  empty_lines:
    blanks: 1
    newline_count: 1
  
  # L042: Usar underscore em nomes
  naming_convention:
    match_parentheses: true
  
  # L043: Keywords em uppercase
  keywords:
    capitalisation_policy: consistent
  
  # L044: Type casting
  types:
    capitalisation_policy: consistent
  
  # L045: Wildcards em JOINs
  select_clause_comma_newline: false
  
  # L047: Comparisons
  comparison:
    nulls_first: false
  
  # L048: Qualified column references
  references:
    qualification: unqualified
  
  # L050: Table aliases
  table_alias:
    aliasing: explicit
  
  # Trailing whitespace
  trailing_whitespace: enable

# ============================================================================
# DISABLE/EXCLUDE SPECIFIC RULES (if needed)
# ============================================================================
# Exemplos (descomente conforme necessário):
# rules:
#   L001:
#     disabled: true
#   L009:
#     disabled: true
